<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<title>Thank You — Da Vinci Consulting Services</title>
<meta name="description" content="Thank you for contacting Da Vinci Consulting Services.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; }
  body { margin:0; background:#F6F1E7; -webkit-font-smoothing:antialiased; }
  ::selection { background:#B68B3C; color:#211C18; }
  @keyframes dvRise { from { transform:translateY(24px); } to { transform:translateY(0); } }
  [data-reveal]{ animation:dvRise .75s cubic-bezier(.22,1,.36,1) both; }
  @media (max-width:940px){ [data-desktop-nav]{display:none !important;} [data-mobile-toggle]{display:inline-flex !important;} }
  @media (min-width:941px){ [data-mobile-toggle]{display:none !important;} }
  @media (prefers-reduced-motion:reduce){ [data-reveal]{animation:none !important;} }
</style>
</helmet>

<div style="font-family:'Inter',sans-serif;color:#3A342C;background:#F6F1E7;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;">
<dc-import name="SiteHeader" hint-size="100%,74px"></dc-import>

<section data-screen-label="Thank You" style="flex:1;margin-top:74px;position:relative;display:flex;align-items:center;justify-content:center;text-align:center;padding:clamp(64px,10vw,140px) clamp(20px,5vw,40px);overflow:hidden;">
  <svg viewBox="0 0 600 600" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(560px,90vw);height:min(560px,90vw);opacity:.5;pointer-events:none;">
    <rect x="120" y="120" width="360" height="360" fill="none" stroke="#211C18" stroke-width="1" opacity=".1"/>
    <circle cx="300" cy="300" r="180" fill="none" stroke="#B68B3C" stroke-width="1.2" opacity=".4"/>
    <line x1="300" y1="80" x2="300" y2="520" stroke="#B68B3C" stroke-width=".6" opacity=".2"/>
    <line x1="80" y1="300" x2="520" y2="300" stroke="#B68B3C" stroke-width=".6" opacity=".2"/>
  </svg>
  <div data-reveal style="position:relative;max-width:560px;">
    <div style="width:64px;height:64px;margin:0 auto 26px;border-radius:50%;border:1.5px solid #1F8A5B;display:flex;align-items:center;justify-content:center;background:#FBF8F1;"><span style="color:#1F8A5B;font-size:28px;">✓</span></div>
    <p style="font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:#876728;margin:0 0 18px;">Message received</p>
    <h1 style="font-family:'Fraunces',serif;font-weight:600;font-size:clamp(34px,5vw,56px);line-height:1.05;letter-spacing:-.015em;color:#211C18;margin:0 0 20px;text-wrap:balance;">Thank you. We'll be in touch shortly.</h1>
    <p style="font-size:18px;line-height:1.6;color:#3A342C;margin:0 0 36px;">A senior consultant will review your message and reach out, usually within one business day. Need something sooner? Call us directly.</p>
    <div style="display:flex;flex-wrap:wrap;gap:14px;justify-content:center;">
      <a href="tel:4806068602" style="text-decoration:none;display:inline-flex;align-items:center;gap:10px;font-weight:600;font-size:16px;padding:16px 30px;border-radius:999px;background:#B68B3C;color:#211C18;transition:background .15s;" style-hover="background:#CDA14E;">Call 480-606-8602</a>
      <a href="Home.dc.html" style="text-decoration:none;display:inline-flex;align-items:center;gap:10px;font-weight:600;font-size:16px;padding:16px 28px;border-radius:999px;background:transparent;color:#211C18;border:1px solid #211C18;transition:background .15s,color .15s;" style-hover="background:#211C18;color:#FBF8F1;">Back to Home</a>
    </div>
  </div>
</section>

<dc-import name="SiteFooter" hint-size="100%,560px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() {
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return;
    document.querySelectorAll("[data-reveal][data-reveal-delay]").forEach(el => { el.style.animationDelay = (el.getAttribute("data-reveal-delay") || 0) + "ms"; });
  }
}
</script>
</body>
</html>
